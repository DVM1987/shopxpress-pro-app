name: bump-tag

# Trigger:
# - workflow_run lắng build-push completed trên main
# - Job tự check conclusion=success mới chạy (skip khi build-push fail)
on:
  workflow_run:
    workflows: ["build-push"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

# Queue tuần tự — tránh 2 commit liên tiếp đẻ 2 bot push race repo deploy
# cancel-in-progress=false vì bot đã commit rồi mà cancel thì state lệch
concurrency:
  group: bump-tag-deploy
  cancel-in-progress: false

env:
  DEPLOY_REPO: DVM1987/shopxpress-pro-deploy
  DEPLOY_BRANCH: main
  TARGET_ENV: dev

jobs:
  # ============================================================
  # Job 1: detect-changes
  # ============================================================
  # Re-run paths-filter trên ĐÚNG commit đã trigger build-push
  # (workflow_run chạy ở context riêng, không tự biết file nào đổi).
  detect-changes:
    name: Detect changed services
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout app repo at triggered SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      # Bỏ ref/base — checkout đã set ref + fetch-depth: 2,
      # paths-filter tự diff HEAD vs HEAD~1 (default mode for push event).
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway:
              - 'services/gateway/**'
              - 'pkg/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
            products:
              - 'services/products/**'
              - 'pkg/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
            orders:
              - 'services/orders/**'
              - 'pkg/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'

  # ============================================================
  # Job 2: bump (matrix per service)
  # ============================================================
  # max-parallel: 1 → 3 service tuần tự, tránh race git push deploy repo.
  bump:
    name: bump ${{ matrix.service }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    steps:
      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "TAG=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # Load private key vào ssh-agent → mọi git command dùng SSH protocol
      # tự authenticate. KHÔNG dùng PAT, KHÔNG ghi key xuống disk.
      - name: Setup SSH agent with deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_DEPLOY_KEY }}

      - name: Trust github.com host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

      - name: Checkout deploy repo (SSH)
        run: |
          git clone --depth=1 --branch=${{ env.DEPLOY_BRANCH }} \
            git@github.com:${{ env.DEPLOY_REPO }}.git deploy
          cd deploy
          git config user.email "shopxpress-pro-bot@users.noreply.github.com"
          git config user.name  "shopxpress-pro-bot"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump image tag in values-${{ env.TARGET_ENV }}.yaml
        working-directory: deploy
        run: |
          FILE="services/${{ matrix.service }}/values-${{ env.TARGET_ENV }}.yaml"
          NEW_TAG="${{ steps.tag.outputs.TAG }}"
          CURRENT_TAG=$(yq eval '.image.tag' "$FILE")
          echo "Current: $CURRENT_TAG → New: $NEW_TAG"
          if [ "$CURRENT_TAG" = "$NEW_TAG" ]; then
            echo "Tag already up-to-date, skip commit"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          yq eval -i ".image.tag = \"$NEW_TAG\"" "$FILE"
          git add "$FILE"

      # Retry push 3 lần với pull --rebase — tránh non-fast-forward khi 2 service
      # chạy gần nhau (max-parallel=1 đã giảm rủi ro nhưng vẫn defensive).
      - name: Commit + push deploy repo (retry on conflict)
        if: env.SKIP != 'true'
        working-directory: deploy
        run: |
          git commit -m "bot: bump ${{ matrix.service }} ${{ env.TARGET_ENV }} → ${{ steps.tag.outputs.TAG }}" \
                     -m "Source-Repo: ${{ github.repository }}" \
                     -m "Source-SHA: ${{ github.event.workflow_run.head_sha }}" \
                     -m "Source-Run: ${{ github.event.workflow_run.html_url }}"
          for i in 1 2 3; do
            if git push origin ${{ env.DEPLOY_BRANCH }}; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed, rebasing and retrying ($i/3)"
            git pull --rebase origin ${{ env.DEPLOY_BRANCH }}
            sleep 2
          done
          echo "Push failed after 3 attempts" >&2
          exit 1

      - name: Summary
        run: |
          {
            echo "## bump ${{ matrix.service }} ${{ env.TARGET_ENV }}"
            echo "- New tag: \`${{ steps.tag.outputs.TAG }}\`"
            echo "- Source SHA: \`${{ github.event.workflow_run.head_sha }}\`"
            echo "- Skipped: ${{ env.SKIP == 'true' }}"
          } >> "$GITHUB_STEP_SUMMARY"
